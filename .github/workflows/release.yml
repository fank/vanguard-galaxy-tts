name: Package release

# Triggers when a GitHub Release is published. Also runnable manually.
#
# The plugin references Assembly-CSharp.dll — the game's proprietary
# assembly — which can't live on a public runner. Instead the repo
# commits a PUBLICIZED stub (method signatures only, no IL) at
# VGTTS/lib/Assembly-CSharp.dll. CI compiles against that stub; the
# real game assembly takes over at runtime via Mono's late binding.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)package"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout repo at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify publicized game reference is committed
        run: |
          if [ ! -s VGTTS/lib/Assembly-CSharp.dll ]; then
            echo "::error::VGTTS/lib/Assembly-CSharp.dll is missing or empty. Regenerate via 'assembly-publicizer ... -o VGTTS/lib/Assembly-CSharp.dll' and commit."
            exit 1
          fi
          echo "Publicized reference present: $(du -h VGTTS/lib/Assembly-CSharp.dll | cut -f1)"

      - name: Build VGTTS.dll
        run: dotnet build VGTTS/VGTTS.csproj -c Debug --nologo

      - name: Fetch Kokoro + sherpa-onnx bundles
        run: make download-kokoro

      - name: Stage release layout
        id: stage
        run: |
          VERSION=$(grep 'PluginVersion =' VGTTS/Plugin.cs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PKG_NAME="VGTTS-v${VERSION}"
          # Nested VGTTS/ is intentional: it's the folder the user drops
          # into BepInEx/plugins/. Inside it: DLL + prerender/ + tools/
          # side-by-side. The plugin resolves paths relative to itself so
          # there's no extra subfolder nesting.
          PKG_DIR="dist/${PKG_NAME}/VGTTS"

          rm -rf "dist/${PKG_NAME}"
          mkdir -p "$PKG_DIR/prerender" "$PKG_DIR/tools"

          cp VGTTS/bin/Debug/netstandard2.1/VGTTS.dll "$PKG_DIR/"
          cp LICENSE THIRD_PARTY_NOTICES.md README.md "$PKG_DIR/"

          # Prerender pack — preserve speaker-folder tree, skip variants/
          cp prerender/manifest.json "$PKG_DIR/prerender/"
          if [ -f prerender/captain_name_templates.json ]; then
            cp prerender/captain_name_templates.json "$PKG_DIR/prerender/"
          fi
          for d in prerender/*/; do
            case "$d" in prerender/variants/) continue ;; esac
            cp -r "$d" "$PKG_DIR/prerender/"
          done

          # Kokoro + sherpa-onnx bundle
          cp -r tools/kokoro tools/sherpa "$PKG_DIR/tools/"

          OGGS=$(find "$PKG_DIR/prerender/" -name "*.ogg" | wc -l)
          SIZE=$(du -sh "$PKG_DIR" | cut -f1)
          echo "Staged $OGGS OGGs + DLL + Kokoro bundle — $SIZE at $PKG_DIR"

          echo "pkg_name=${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Zip release bundle
        run: |
          cd dist/${{ steps.stage.outputs.pkg_name }} && \
            zip -qr "../${{ steps.stage.outputs.pkg_name }}.zip" VGTTS
          ls -lh "dist/${{ steps.stage.outputs.pkg_name }}.zip"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" "dist/${{ steps.stage.outputs.pkg_name }}.zip" --clobber
          echo "Uploaded ${{ steps.stage.outputs.pkg_name }}.zip to release $TAG"
